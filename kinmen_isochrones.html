            align-items: center;

];

        // ==========================================
        // 地圖初始化
        // ==========================================
        const map = L.map('map').setView([24.435, 118.32], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // 儲存目前地圖上的圖層，方便清除
        let currentLayers = [];
        let isFetching = false;

        // --- 新增：按鈕冷卻倒數功能 ---
        function startCooldown(seconds) {
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            let remain = seconds;
            btn.innerText = `冷卻中 (${remain}s)...`;
            
            const timer = setInterval(() => {
                remain--;
                if (remain <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "更新地圖與範圍";
                } else {
                    btn.innerText = `冷卻中 (${remain}s)...`;
                }
            }, 1000);
        }
        // ------------------------------

        const isochroneCache = {}; // 記憶體快取

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // ==========================================
        // 核心邏輯
        // ==========================================
        async function updateMap() {
            if (isFetching) return;
            isFetching = true;
            
            const btn = document.getElementById('update-btn');
            btn.innerText = "讀取中...";
            btn.disabled = true;

            // 取得使用者設定
            const selectedType = document.getElementById('store-filter').value;
            const selectedMode = document.getElementById('transport-mode').value;
            const modeText = document.getElementById('transport-mode').options[document.getElementById('transport-mode').selectedIndex].text;
            let timeMinutes = parseInt(document.getElementById('time-input').value);
            if (isNaN(timeMinutes) || timeMinutes < 1) timeMinutes = 15;
            
            // 更新 UI 顯示
            document.getElementById('time-display').innerText = timeMinutes;
            document.getElementById('mode-display').innerText = modeText;
            const timeSeconds = timeMinutes * 60;

            // 清除舊圖層
            currentLayers.forEach(layer => map.removeLayer(layer));
            currentLayers = [];

            // 篩選資料
            const filteredStores = storesData.filter(store => {
                if (selectedType === "All") return true;
                return store.type === selectedType;
            });

            // 準備載入
            // 將商店分組，每組最多 5 筆，以避免短時間內超出 API 配額
            const chunkSize = 5;
            const chunks = [];
            for (let i = 0; i < filteredStores.length; i += chunkSize) {
                chunks.push(filteredStores.slice(i, i + chunkSize));
            }

            // 先把所有地標標示上去
            const markers = [];
            filteredStores.forEach(store => {
                const marker = L.marker([store.lat, store.lng]).addTo(map)
                    .bindPopup(`<b>${store.name}</b><br>正在載入路線範圍...`);
                currentLayers.push(marker);
                markers.push({ store, marker });
            });

            // 收集所有的 GeoJSON Features，等全部抓完後再依據模式繪製
            let allFeatures = [];
            let hasPrecomputed = true; // 預設標記，檢查是否全從快取讀取

            // 批次發送 API 請求
            for (let c = 0; c < chunks.length; c++) {
                const chunk = chunks[c];
                const tSecStr = String(timeSeconds);
                let data;
                
                // 1. 檢查是否有預先運算的資料
                let foundInPre = false;
                if (typeof precomputedIsochrones !== 'undefined' && 
                    precomputedIsochrones[selectedMode] && 
                    precomputedIsochrones[selectedMode][tSecStr] &&
                    precomputedIsochrones[selectedMode][tSecStr][c]) {
                    
                    data = precomputedIsochrones[selectedMode][tSecStr][c];
                    foundInPre = true;
                }
                
                if (!foundInPre) {
                    hasPrecomputed = false; // 確實發送了網路請求
                    // 2. 檢查記憶體快取
                    const cacheKey = `${selectedMode}_${timeSeconds}_${chunk.map(s => s.name).join('-')}`;
                    if (isochroneCache[cacheKey]) {
                        data = isochroneCache[cacheKey];
                    } else {
                        // 3. 發送 API 請求
                        const requestBody = {
                            locations: chunk.map(s => [s.lng, s.lat]), 
                            range: [timeSeconds],
                            range_type: "time"
                        };
                        
                        try {
                            const response = await fetch(`https://api.openrouteservice.org/v2/isochrones/${selectedMode}`, {
                                method: 'POST',
                                headers: {
                                    'Accept': 'application/json, application/geo+json, application/gpx+xml, img/png; charset=utf-8',
                                    'Authorization': ORS_API_KEY,
                                    'Content-Type': 'application/json; charset=utf-8'
                                },
                                body: JSON.stringify(requestBody)
                            });

                            if (!response.ok) throw new Error(`API 錯誤 ${response.status}`);
                            data = await response.json();
                            isochroneCache[cacheKey] = data;
                            await delay(1000);
                        } catch (error) {
                            console.error('Fetch error:', error);
                        }
                    }
                }

                // 將這批的 features 收集起來
                if (data && data.features) {
                    data.features.forEach(f => {
                        // 附加上原始的 store 資訊以利後續使用
                        f.properties.store = chunk[f.properties.group_index];
                        allFeatures.push(f);
                    });
                }

                // 更新 Marker 彈出視窗
                chunk.forEach((store) => {
                    const m = markers.find(item => item.store === store);
                    if (m) {
                        m.marker.setPopupContent(`<b>${store.name}</b><br>✅ 已讀取範圍`);
                    }
                });
            }

            // 若抓取失敗或無資料，提前中止
            if (allFeatures.length === 0) {
                alert("API 請求失敗或超過限制。按鈕將進入 60 秒冷卻倒數，請稍後再試！\n\n💡 提示：輸入 5, 10, 15, 20, 25, 30 分鐘可直接使用快取，無須冷卻！");
                isFetching = false;
                startCooldown(60); // API 失敗強制冷卻 60 秒
                return;
            }

            // ==========================================
            // 根據分析視角繪製地圖
            // ==========================================
            const analysisMode = document.getElementById('analysis-mode').value;

            if (analysisMode === 'standard') {
                // 模式一：一般顯示，根據品牌上色
                const layer = L.geoJSON({ type: "FeatureCollection", features: allFeatures }, {
                    style: function(feature) {
                        const store = feature.properties.store;
                        return {
                            color: store.type === '711' ? '#27ae60' : '#2980b9',
                            weight: 2,
                            opacity: 0.8,
                            fillColor: store.type === '711' ? '#2ecc71' : '#3498db',
                            fillOpacity: 0.2
                        };
                    }
                }).addTo(map);
                currentLayers.push(layer);

            } else if (analysisMode === 'competition') {
                // 模式二：競爭熱區 (Heatmap)，全部塗同一個顏色且去除邊框，讓重疊處顏色加深
                const layer = L.geoJSON({ type: "FeatureCollection", features: allFeatures }, {
                    style: function(feature) {
                        return {
                            color: 'transparent',
                            weight: 0,
                            fillColor: '#c0392b', // 紅色
                            fillOpacity: 0.15      // 較低的透明度，疊加越多次越深
                        };
                    }
                }).addTo(map);
                currentLayers.push(layer);

            } else if (analysisMode === 'uncovered') {
                // 模式三：拓點機會 (反轉顯示，只顯示沒有被覆蓋的區域)
                try {
                    // 1. 建立一個包含整個金門視野的「外框多邊形」
                    // 取得目前地圖可視範圍的邊界 (西, 南, 東, 北)
                    const bounds = map.getBounds();
                    const bbox = [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()];
                    const maskPolygon = turf.bboxPolygon(bbox);

                    // 2. 將所有的等時線合併 (Union)
                    // 因為 Turf dissolve 要求所有的幾何圖形都是 Polygon 且屬性相同最好，
                    // 所以我們直接把所有 features 丟給 turf.union 或者 dissolve
                    
                    let mergedIsochrones = allFeatures[0];
                    for (let i = 1; i < allFeatures.length; i++) {
                        try {
                            // 修正 Turf 6 中 union 接收兩個 polygon 的語法
                            let res = turf.union(mergedIsochrones, allFeatures[i]);
                            if (res) mergedIsochrones = res;
                        } catch(e) {
                            console.warn("Union skip:", e);
                        }
                    }

                    // 3. 用外框扣除掉合併後的等時線區域
                    let uncoveredArea;
                    try {
                        uncoveredArea = turf.difference(maskPolygon, mergedIsochrones);
                    } catch(e) {
                        console.warn("Difference skip:", e);
                        uncoveredArea = maskPolygon; // fallback
                    }

                    // 4. 畫到地圖上，用亮色系凸顯「拓點機會」區域（即未被等時線覆蓋的區域）
                    const layer = L.geoJSON(uncoveredArea, {
                        style: {
                            fillColor: '#FF4136', // 亮紅色凸顯無服務區
                            fillOpacity: 0.4,
                            color: '#FF4136',
                            weight: 1
                        }
                    }).addTo(map);
                    currentLayers.push(layer);
                    
                } catch (e) {
                    console.error("Turf js error:", e);
                    alert("幾何運算失敗，請確保載入範圍後再試！");
                }
            } else if (analysisMode === 'voronoi') {
                // 模式四：勢力劃分 (Voronoi 絕對領域)
                try {
                    // 1. 取得大金門與小金門的固定邊界當作 Voronoi 的計算邊界，避免縮放地圖時座標出界導致運算崩潰
                    const bbox = [118.150, 24.350, 118.500, 24.550];
                    
                    // 2. 準備所有店家的 FeatureCollection
                    const points = turf.featureCollection(
                        filteredStores.map(s => turf.point([s.lng, s.lat], { store: s }))
                    );

                    // 3. 產生泰森多邊形 (Voronoi)
                    const voronoiPolygons = turf.voronoi(points, { bbox: bbox });

                    // 4. 將每個 Voronoi 多邊形與其對應的等時線進行交集 (Intersect)
                    const voronoiFeatures = [];
                    
                    // turf.voronoi 回傳的順序與輸入的 points 相同
                    turf.featureEach(voronoiPolygons, function(currentVoronoi, currentIndex) {
                        if (!currentVoronoi) return; // 有些點可能在邊界外產生不出多邊形
                        
                        const store = filteredStores[currentIndex];
                        
                        // 找到該店對應的等時線 (allFeatures)
                        const storeIsochrone = allFeatures.find(f => f.properties.store === store);
                        
                        if (storeIsochrone) {
                            try {
                                // 將 Voronoi 多邊形與該店的等時線取交集
                                const intersection = turf.intersect(currentVoronoi, storeIsochrone);
                                if (intersection) {
                                    intersection.properties = { store: store };
                                    voronoiFeatures.push(intersection);
                                }
                            } catch (e) {
                                console.warn("Intersect failed for store", store.name, e);
                            }
                        }
                    });

                    // 5. 繪製不重疊的勢力範圍
                    const layer = L.geoJSON({ type: "FeatureCollection", features: voronoiFeatures }, {
                        style: function(feature) {
                            const store = feature.properties.store;
                            return {
                                color: store.type === '711' ? '#27ae60' : '#2980b9',
                                weight: 2,
                                opacity: 1, // 邊界清晰
                                fillColor: store.type === '711' ? '#2ecc71' : '#3498db',
                                fillOpacity: 0.5 // 提高不透明度展現領域感
                            };
                        }
                    }).addTo(map);
                    currentLayers.push(layer);
                    
                } catch (e) {
                    console.error("Voronoi error:", e);
                    alert("勢力劃分運算失敗，請確認圖資後再試！");
                }
            }

            isFetching = false;
            
            // 確保有切換按鈕文字回來 (若為 API 查詢，給予 15 秒基礎冷卻避免超額)
            if (!hasPrecomputed) {
                startCooldown(15);
            } else {
                btn.innerText = "更新地圖與範圍";
                btn.disabled = false;
            }
        }

        // 初始載入一次
        updateMap();
    </script>
</body>
</html>
