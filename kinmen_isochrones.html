                        "lat": 24.48904135818266,

            }
];

        // ==========================================
        // 地圖初始化
        // ==========================================
        const map = L.map('map').setView([24.435, 118.32], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // 儲存目前地圖上的圖層，方便清除
        let currentLayers = [];
        let isFetching = false;
        const isochroneCache = {}; // 記憶體快取

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // ==========================================
        // 核心邏輯
        // ==========================================
        async function updateMap() {
            if (isFetching) return;
            isFetching = true;
            
            const btn = document.getElementById('update-btn');
            btn.innerText = "讀取中...";
            btn.disabled = true;

            // 取得使用者設定
            const selectedType = document.getElementById('store-filter').value;
            const selectedMode = document.getElementById('transport-mode').value;
            const modeText = document.getElementById('transport-mode').options[document.getElementById('transport-mode').selectedIndex].text;
            let timeMinutes = parseInt(document.getElementById('time-input').value);
            if (isNaN(timeMinutes) || timeMinutes < 1) timeMinutes = 15;
            
            // 更新 UI 顯示
            document.getElementById('time-display').innerText = timeMinutes;
            document.getElementById('mode-display').innerText = modeText;
            const timeSeconds = timeMinutes * 60;

            // 清除舊圖層
            currentLayers.forEach(layer => map.removeLayer(layer));
            currentLayers = [];

            // 篩選資料
            const filteredStores = storesData.filter(store => {
                if (selectedType === "All") return true;
                return store.type === selectedType;
            });

            // 準備載入
            // 將商店分組，每組最多 5 筆，以避免短時間內超出 API 配額
            const chunkSize = 5;
            const chunks = [];
            for (let i = 0; i < filteredStores.length; i += chunkSize) {
                chunks.push(filteredStores.slice(i, i + chunkSize));
            }

            // 先把所有地標標示上去
            const markers = [];
            filteredStores.forEach(store => {
                const marker = L.marker([store.lat, store.lng]).addTo(map)
                    .bindPopup(`<b>${store.name}</b><br>正在載入路線範圍...`);
                currentLayers.push(marker);
                markers.push({ store, marker });
            });

            // 批次發送 API 請求
            for (let c = 0; c < chunks.length; c++) {
                const chunk = chunks[c];
                
                let data;
                
                // 1. 檢查是否有預先運算的資料
                let hasPrecomputed = false;
                if (typeof precomputedIsochrones !== 'undefined' && 
                    precomputedIsochrones[selectedMode] && 
                    precomputedIsochrones[selectedMode][String(timeSeconds)] &&
                    precomputedIsochrones[selectedMode][String(timeSeconds)][c]) {
                    
                    data = precomputedIsochrones[selectedMode][String(timeSeconds)][c];
                    hasPrecomputed = true;
                }
                
                if (!hasPrecomputed) {
                    // 2. 如果沒有預先運算資料，檢查記憶體快取
                    const cacheKey = `${selectedMode}_${timeSeconds}_${chunk.map(s => s.name).join('-')}`;
                    if (isochroneCache[cacheKey]) {
                        data = isochroneCache[cacheKey];
                    } else {
                        // 3. 都沒有的話，才真的發送 API 請求
                        const requestBody = {
                            locations: chunk.map(s => [s.lng, s.lat]), 
                            range: [timeSeconds],
                            range_type: "time"
                        };
                        
                        const response = await fetch(`https://api.openrouteservice.org/v2/isochrones/${selectedMode}`, {
                            method: 'POST',
                            headers: {
                                'Accept': 'application/json, application/geo+json, application/gpx+xml, img/png; charset=utf-8',
                                'Authorization': ORS_API_KEY,
                                'Content-Type': 'application/json; charset=utf-8'
                            },
                            body: JSON.stringify(requestBody)
                        });

                        if (!response.ok) {
                            throw new Error(`API 錯誤 ${response.status}`);
                        }

                        data = await response.json();
                        isochroneCache[cacheKey] = data;
                        
                        // 只有真的發送 API 請求時才需要延遲，避免短時間大量請求
                        await delay(1000);
                    }
                }
                    
                    const isochroneLayer = L.geoJSON(data, {
                        style: function(feature) {
                            // 根據回傳的 group_index 對應到 chunk 中的商店
                            const index = feature.properties.group_index;
                            const store = chunk[index];
                            if (!store) return { color: '#ff4757', fillColor: '#ff6b81' };
                            return {
                                color: store.type === '711' ? '#27ae60' : '#2980b9',
                                weight: 2,
                                opacity: 0.8,
                                fillColor: store.type === '711' ? '#2ecc71' : '#3498db',
                                fillOpacity: 0.2
                            };
                        }
                    }).addTo(map);
                    
                    currentLayers.push(isochroneLayer);

                    // 更新這批的 Marker 彈出視窗
                    chunk.forEach((store, idx) => {
                        const m = markers.find(item => item.store === store);
                        if (m) {
                            m.marker.setPopupContent(`<b>${store.name}</b><br>✅ 已標示 ${modeText} ${timeMinutes} 分鐘範圍`);
                        }
                    });
                } catch (error) {
                    console.error('Error fetching isochrone batch:', error);
                    chunk.forEach((store) => {
                        const m = markers.find(item => item.store === store);
                        if (m) {
                            m.marker.setPopupContent(`<b>${store.name}</b><br><span style="color:red;">無法載入範圍 (請稍後再試)</span>`);
                        }
                    });
                }
            }

            btn.innerText = "更新地圖與範圍";
            btn.disabled = false;
            isFetching = false;
        }

        

        // 初始載入一次
        updateMap();
