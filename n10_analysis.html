<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N10 拓點決策系統 (三層疊加法)</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: '微軟正黑體', sans-serif; display: flex; height: 100vh; }
        #map { flex: 1; height: 100%; }
        #sidebar { 
            width: 350px; 
            background: #2c3e50; 
            color: white; 
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        h2 { margin-top: 0; color: #f1c40f; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        .step-box { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .step-title { font-weight: bold; color: #1abc9c; margin-bottom: 10px; }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #c0392b; }
        button.active { background: #27ae60; }
        #analysis-result {
            display: none;
            background: #fff;
            color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #8e44ad;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .highlight { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <!-- 控制面板 -->
    <div id="sidebar">
        <h2>自動確定拓點系統</h2>
        
        <div class="step-box">
            <div class="step-title">📍 第 1 層：基礎地圖</div>
            <div>已載入金門地理圖資。</div>
        </div>

        <div class="step-box">
            <div class="step-title">🔥 第 2 層：人口密度熱區</div>
            <div>已載入各村里人口密度加權資料。地圖上的紅色區域代表高密度消費市場。</div>
        </div>

        <div class="step-box">
            <div class="step-title">🎯 第 3 層：N10 方案等時線</div>
            <div>測試地點：慈湖農莊 (N10)</div>
            <button id="toggle-n10-btn">疊加 N10 等時線 (機車2分)</button>
        </div>

        <!-- 決策分析面板 -->
        <div id="analysis-result">
            <b>【系統自動選址決策分析】</b><br><br>
            經系統比對真實路網導航，此方案之「機車 2 分鐘等時線」成功框列了古寧村與安美村交界核心。<br><br>
            雖然 <span class="highlight">N10 (慈湖農莊)</span> 本身為農地真空區，但等時線向外延伸的「章魚腳」成功抓取了金寧鄉每平方公里高達 <span class="highlight">1180 人</span> 的高強度人口熱區。<br><br>
            此方案兼具商業損益平衡（低租金/低競爭）與高覆蓋率，為本次分析之最優解。
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet.heat 插件 -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        // 初始化地圖 (視角設定在金寧鄉附近)
        const map = L.map('map').setView([24.455, 118.325], 14);

        // 載入底圖 (第 1 層)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // ==========================================
        // 第 2 層：人口密度熱區 (Heatmap)
        // ==========================================
        // 勞凡注意：這裡放入金門主要聚落的座標與「人口強度」
        // 格式: [緯度, 經度, 強度值]
        const heatData = [
            [24.444, 118.322, 1880], // 金城
            [24.451, 118.355, 1180], // 金寧核心
            [24.460, 118.315, 800],  // 古寧村周邊
            [24.465, 118.330, 950],  // 安美村周邊
            [24.435, 118.335, 1500]  // 榜林周邊
        ];

        // 建立熱區圖層並加到地圖上
        const heatLayer = L.heatLayer(heatData, {
            radius: 50,      // 熱區的半徑大小
            blur: 30,        // 邊緣模糊程度，數值越大越融合
            maxZoom: 14,
            max: 2000,       // 最大強度值 (對應上方設定的 1880)
            gradient: {0.4: 'blue', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red'} // 漸層顏色
        }).addTo(map);


        // ==========================================
        // 第 3 層：N10 方案等時線 (Isochrone)
        // ==========================================
        let isochroneLayer = null;

        // 標記 N10 位置 (慈湖農莊)
        const n10Marker = L.marker([24.455, 118.318]).addTo(map)
            .bindPopup("<b>N10 方案</b><br>慈湖農莊 (低競爭農地真空區)");

        // 點擊按鈕的事件邏輯
        document.getElementById('toggle-n10-btn').addEventListener('click', function() {
            const btn = this;
            const resultPanel = document.getElementById('analysis-result');

            if (isochroneLayer) {
                // 如果已經畫了，就把它移除 (關閉功能)
                map.removeLayer(isochroneLayer);
                isochroneLayer = null;
                btn.innerText = "疊加 N10 等時線 (機車2分)";
                btn.classList.remove('active');
                resultPanel.style.display = 'none';
            } else {
                // 如果還沒畫，就直接載入內建的 N10 等時線 GeoJSON (避免本地端讀取 JSON 發生 CORS 錯誤)
                btn.innerText = "讀取資料中...";
                
                const geojsonData = {"type":"Feature","properties":{},"geometry":{"type":"Polygon","coordinates":[[[118.33367464826806,24.454999236113952],[118.33334449126914,24.455685447740553],[118.3334204396631,24.45638176349828],[118.32772990700524,24.45631332286672],[118.32955000681633,24.457090732563817],[118.3276822682217,24.457207186699037],[118.33138561498079,24.4586954634856],[118.32804200798113,24.45827016131484],[118.3291840280055,24.459216295970688],[118.32676434269496,24.458772784602314],[118.33139975795082,24.46151885937193],[118.33079904159742,24.46198229963186],[118.32963865330174,24.462078133269507],[118.33478691831203,24.46633171390857],[118.32738146358304,24.46200762077032],[118.33128985497765,24.46596333721868],[118.32725565211561,24.463424339972388],[118.32606155422263,24.46309568821011],[118.32747161880003,24.4655046390382],[118.32755860704098,24.466730751857526],[118.32561284380446,24.46537015434406],[118.32276299797024,24.4622328840659],[118.3237482394327,24.46478834810684],[118.3233799754892,24.465353398817445],[118.32227415657081,24.46439199057093],[118.32306595466791,24.467886815631363],[118.32161849641878,24.46585726733972],[118.3204454660014,24.463886038000805],[118.31981669595193,24.46331289192037],[118.32008240050142,24.467777603579435],[118.31907129500456,24.464900165031274],[118.31879375627763,24.469706182029334],[118.318,24.467470332551645],[118.31720949690407,24.46964590926885],[118.31678472488605,24.466230729290555],[118.31591904235076,24.467768750242527],[118.31530232805756,24.467344088327064],[118.31503391824411,24.46577778843835],[118.31521880923003,24.46334493895188],[118.31293060449028,24.46789556847203],[118.31275152120273,24.466532956867393],[118.31255519688396,24.465478155199023],[118.31305242594573,24.46342494083528],[118.31153785651718,24.464813133434117],[118.3126035838692,24.462350954468324],[118.31223278318596,24.462077787491825],[118.31133470532323,24.462392243727383],[118.30999828116883,24.463035599465467],[118.311 31962431693353,24.44503106117684],[118.3199035612391,24.446287761435055],[118.32032625251928,24.4465453343157],[118.32234942456876,24.441946791324035],[118.32175027978272,24.445457961678102],[118.32226455456227,24.44562709553029],[118.32421866521719,24.443030023417094],[118.32417301548561,24.444486055966244],[118.3234981306366,24.44664896579688],[118.32370950637232,24.447220862383915],[118.32652629284729,24.44453385540663],[118.3252293581133,24.44698039895403],[118.32877217630035,24.444179790703107],[118.3258481688868,24.447855105066118],[118.3287741669298,24.446109898827086],[118.3299024330863,24.446107199618922],[118.32693626232917,24.448966264106513],[118.32790778667479,24.44897298619064],[118.33187977329034,24.44742613147316],[118.32955338210186,24.44937782496213],[118.33125589292948,24.449292048277012],[118.3286086008919,24.450999352711214],[118.3284979799991,24.451580142161465],[118.32883682113687,24.452007003677565],[118.3333867559897,24.451490771028148],[118.32869980254706,24.45306206397008],[118.33170604605635,24.453148606458793],[118.32990095687774,24.453932426411097],[118.32888522244762,24.45451268571018],[118.33401776511852,24.454999219392544],[118.32789384564877,24.454999517834754]]]}}};
                
                // 老張注意：這就是把等時線疊上去的魔法程式碼！
                isochroneLayer = L.geoJSON(geojsonData, {
                    style: {
                        color: "#003399",       // 深藍色邊框
                        weight: 2,
                        fillColor: "#003399",   // 深藍色填滿
                        fillOpacity: 0.4        // 半透明，才能透出底下的熱區顏色！
                    }
                }).addTo(map);

                // 更新按鈕與顯示分析文字
                btn.innerText = "隱藏 N10 等時線";
                btn.classList.add('active');
                resultPanel.style.display = 'block';

                // 視角自動縮放至等時線範圍
                map.fitBounds(isochroneLayer.getBounds());
                n10Marker.openPopup();
            }
        });
    </script>
</body>
</html>
